<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UMARSHOYI-SUB</title>
    <style>
        *{margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif}
        body{background:#f4f7fc; min-height:100vh; display:flex; justify-content:center}
        .app-container{width:100%; max-width:480px; min-height:100vh; position:relative; padding-bottom:80px}
        .page{display:none; padding:20px} .active{display:block}
        .topbar{background:#0A1A7A; color:white; padding:30px 20px; border-radius:0 0 30px 30px; display:flex; align-items:center}
        .avatar{width:50px; height:50px; background:#ddd; border-radius:50%; margin-right:15px}
        .btn{width:100%; padding:18px; margin:10px 0; border:none; border-radius:12px; background:#0A1A7A; color:white; font-weight:bold}
        .box{background:white; padding:20px; border-radius:15px; margin:10px 0; box-shadow:0 2px 5px rgba(0,0,0,0.1)}
        /* FEATURES: Na kara girma da flex don su cika guri */
        .features{display:grid; grid-template-columns: repeat(3, 1fr); gap:12px; margin-top:20px; flex-grow:1}
        .feature{background:white; padding:25px 10px; text-align:center; border-radius:15px; cursor:pointer; font-size:14px; box-shadow:0 2px 5px rgba(0,0,0,0.1); display:flex; flex-direction:column; justify-content:center; align-items:center}
    </style>
</head>
<body>

<div class="app-container">
    <div id="dashboard-page" class="page active">
        <div class="topbar">
            <div class="avatar"></div>
            <div><h3>Good Evening ✋</h3><p id="user-name">User</p></div>
        </div>
        <div class="box">
            <p>Wallet Balance</p><h2 id="balance">₦0.00</h2>
            <button class="btn" style="background:#28a745" onclick="alert('Fund Wallet')">Fund Wallet</button>
        </div>
        <div class="features">
            <div class="feature" onclick="alert('Data')">📊<br>Data</div>
            <div class="feature" onclick="alert('Airtime')">📱<br>Airtime</div>
            <div class="feature" onclick="alert('Cable')">📺<br>Cable</div>
            <div class="feature" onclick="alert('Light')">💡<br>Light</div>
            <div class="feature" onclick="alert('A2Cash')">💰<br>A2Cash</div>
            <div class="feature" onclick="alert('DataCard')">📶<br>DataCard</div>
            <div class="feature" onclick="alert('Exam')">📝<br>Exam</div>
            <div class="feature" onclick="alert('Utility')">⚡<br>Utility</div>
            <div class="feature" onclick="alert('Refer')">👥<br>Refer</div>
        </div>
        <button class="btn" onclick="showPage('history-page')">Transaction History</button>
    </div>

    <div id="history-page" class="page">
        <div class="topbar"><h2>History</h2></div>
        <div id="history-list" class="box">No transactions yet.</div>
        <button class="btn" onclick="showPage('dashboard-page')">Back to Home</button>
    </div>

    <div id="profile-page" class="page">
        <div class="topbar"><h2>Profile</h2></div>
        <div class="box">
            <p>Email: <span id="profile-email"></span></p>
            <hr style="margin:15px 0">
            <p onclick="alert('Change Password')">⚙️ Change Password</p><hr style="margin:15px 0">
            <p onclick="alert('Biometric')">🔐 Setup Biometric</p><hr style="margin:15px 0">
            <p onclick="alert('Change PIN')">💳 Change PIN</p>
        </div>
        <button class="btn" style="background:red" onclick="logout()">Logout</button>
    </div>

    <div style="position:fixed; bottom:0; width:100%; max-width:480px; background:white; display:flex; justify-content:space-around; padding:15px; border-top:1px solid #eee">
        <div onclick="showPage('dashboard-page')">🏠 Home</div>
        <div onclick="showPage('profile-page')">👤 Profile</div>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
    const supabase = createClient('https://lvlbxliuqrgyizxjmmyx.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2bGJ4bGl1cXJneWl6eGptbXl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MDc1OTYsImV4cCI6MjA5OTA4MzU5Nn0.cewsOlpdXupidG2tfiaqOIWvT3FSBgXuW9jQka6JzmA')

    window.showPage = (id) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
        document.getElementById(id).classList.add('active')
    }

    const checkSession = async () => {
        const { data } = await supabase.auth.getSession();
        if(data.session) {
            document.getElementById('user-name').innerText = data.session.user.email;
            document.getElementById('profile-email').innerText = data.session.user.email;
            showPage('dashboard-page');
        } else {
            showPage('login-page');
        }
    }
    checkSession();

    window.logout = async () => { await supabase.auth.signOut(); location.reload(); }
</script>
</body>
</html>
