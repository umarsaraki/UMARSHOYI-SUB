<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UMARSHOYI-SUB | VTU Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://checkout.flutterwave.com/v3.js"></script>
</head>
<body class="bg-gray-100">

  <div id="app" class="max-w-md mx-auto mt-10 p-6 bg-white rounded-lg shadow-md">
    <h1 class="text-2xl font-bold text-center mb-6">UMARSHOYI-SUB</h1>
    
    <!-- AUTH SECTION -->
    <div id="auth-section">
      <div id="login-form">
        <h2 class="text-xl font-semibold mb-4">Login</h2>
        <input id="login-email" type="email" placeholder="Email" class="w-full p-2 border rounded mb-3">
        <input id="login-password" type="password" placeholder="Password" class="w-full p-2 border rounded mb-3">
        <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded">Login</button>
        <p class="text-center mt-3">No account? <a href="#" onclick="showRegister()" class="text-blue-600">Register</a></p>
      </div>

      <div id="register-form" class="hidden">
        <h2 class="text-xl font-semibold mb-4">Register</h2>
        <input id="reg-email" type="email" placeholder="Email" class="w-full p-2 border rounded mb-3">
        <input id="reg-password" type="password" placeholder="Password" class="w-full p-2 border rounded mb-3">
        <button onclick="register()" class="w-full bg-green-600 text-white p-2 rounded">Register</button>
        <p class="text-center mt-3">Have account? <a href="#" onclick="showLogin()" class="text-blue-600">Login</a></p>
      </div>
    </div>

    <!-- DASHBOARD SECTION -->
    <div id="dashboard-section" class="hidden">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold">Dashboard</h2>
        <button onclick="logout()" class="text-red-600">Logout</button>
      </div>
      <div class="bg-blue-100 p-4 rounded mb-4">
        <p class="text-gray-600">Wallet Balance</p>
        <p id="wallet-balance" class="text-3xl font-bold">₦0.00</p>
      </div>
      <button onclick="fundWallet()" class="w-full bg-green-600 text-white p-3 rounded font-bold">Fund Wallet</button>
    </div>
  </div>

<script>
let supabaseClient;
let CONFIG;
let currentUser = null;

async function loadConfig() {
  try {
    const res = await fetch('/config');
    CONFIG = await res.json();
    supabaseClient = supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey);
    checkUser();
  } catch(err) {
    alert("Error loading config. Check server.js and Render env vars");
  }
}

function showRegister() {
  document.getElementById('login-form').classList.add('hidden');
  document.getElementById('register-form').classList.remove('hidden');
}
function showLogin() {
  document.getElementById('register-form').classList.add('hidden');
  document.getElementById('login-form').classList.remove('hidden');
}

async function register() {
  const email = document.getElementById('reg-email').value;
  const password = document.getElementById('reg-password').value;
  const { data, error } = await supabaseClient.auth.signUp({ email, password });
  if (error) return alert(error.message);
  
  await supabaseClient.from('wallets').insert([{ user_id: data.user.id, balance: 0 }]);
  alert('Registration successful! Please login.');
  showLogin();
}

async function login() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if (error) return alert(error.message);
  currentUser = data.user;
  showDashboard();
}

async function logout() {
  await supabaseClient.auth.signOut();
  currentUser = null;
  document.getElementById('dashboard-section').classList.add('hidden');
  document.getElementById('auth-section').classList.remove('hidden');
}

async function checkUser() {
  const { data: { user } = await supabaseClient.auth.getUser();
  if (user) {
    currentUser = user;
    showDashboard();
  }
}

async function showDashboard() {
  document.getElementById('auth-section').classList.add('hidden');
  document.getElementById('dashboard-section').classList.remove('hidden');
  const { data } = await supabaseClient.from('wallets').select('balance').eq('user_id', currentUser.id).single();
  document.getElementById('wallet-balance').innerText = `₦${data.balance.toFixed(2)}`;
}

function fundWallet() {
  FlutterwaveCheckout({
    public_key: CONFIG.flwPublic,
    tx_ref: "UMAR-" + Date.now(),
    amount: 1000,
    currency: "NGN",
    customer: { email: currentUser.email },
    callback: function (data) { verifyPayment(data.tx_ref); },
    onclose: function() {},
  });
}

async function verifyPayment(tx_ref) {
  const res = await fetch('/verify-payment', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ tx_ref })
  });
  const result = await res.json();
  if (result.status === 'success' && result.data.status === 'successful') {
    const amount = result.data.amount;
    await fetch('/credit-wallet', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ user_id: currentUser.id, amount: amount })
    });
    alert(`Payment successful! ₦${amount} added`);
    showDashboard();
  }
}

loadConfig();
</script>
</body>
                                                                                                  </html>
