<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>
<style>body{text-align:center; padding:50px; background:#2563EB; color:white; font-family:Arial;}</style>
</head>
<body>
  <h1>Welcome Back 🎉</h1>
  <h2 id="username">USER</h2>
  <button onclick="logout()" style="padding:12px 30px; border:none; border-radius:8px; margin-top:20px; cursor:pointer;">Logout</button>
  <script>
    const user = JSON.parse(localStorage.getItem('user'));
    if(user){ document.getElementById('username').innerText = user.user_metadata.username; }
    function logout(){
      localStorage.removeItem('user');
      window.location.href = 'index.html';
    }
  </script>
</body></html>
